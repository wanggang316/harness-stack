<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>__TITLE__</title>
<style>
  :root {
    --bg: #0e1116;
    --bg-2: #14181f;
    --surface: #1a1f26;
    --surface-2: #232a33;
    --rule: #2a3038;
    --rule-strong: #3a424d;
    --ink: #e8e4d8;
    --ink-soft: #a8a293;
    --ink-faint: #6b6c6a;

    --serif: ui-serif, "Iowan Old Style", "Apple Garamond", Georgia, "Times New Roman", serif;
    --sans: -apple-system, system-ui, BlinkMacSystemFont, "Inter", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;

    --teal: #5eb89d;
    --rose: #e87878;
    --amber: #d9a55a;
    --violet: #b08bd6;
    --blue: #7aa6d6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.55;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: var(--blue); text-decoration: none; }
  a:hover, a:focus-visible { color: var(--teal); }

  *:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 2px; }

  .layout { display: grid; grid-template-columns: 1fr; }
  @media (min-width: 1024px) {
    .layout { grid-template-columns: 220px minmax(0, 1fr); max-width: 1200px; margin: 0 auto; }
  }

  /* ===== TOC ===== */
  .toc { display: none; padding: 64px 16px 32px; border-right: 1px solid var(--rule); }
  @media (min-width: 1024px) {
    .toc { display: block; position: sticky; top: 0; max-height: 100vh; overflow-y: auto; align-self: start; }
  }
  .toc h4 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin: 0 0 12px;
    font-weight: 500;
  }
  .toc nav { display: grid; gap: 2px; }
  .toc a {
    display: block;
    padding: 5px 10px;
    color: var(--ink-soft);
    border-radius: 4px;
    font-size: 13px;
    transition: background 150ms, color 150ms;
  }
  .toc a:hover, .toc a.active { background: var(--surface); color: var(--ink); }
  .toc a.indent { padding-left: 22px; font-size: 12px; color: var(--ink-faint); }

  /* ===== Main column ===== */
  main { padding: 48px 24px 96px; min-width: 0; }
  @media (min-width: 1024px) { main { padding: 64px 56px 96px; } }

  /* ===== Hero ===== */
  .hero { margin-bottom: 56px; }

  .kicker {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 0 0 12px;
  }

  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin: 0 0 28px;
    color: var(--ink);
  }

  .hero-grid { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }

  .ring { width: 96px; height: 96px; flex: 0 0 auto; }
  .ring-bg { stroke: var(--surface-2); }
  .ring-fg { transition: stroke-dasharray 600ms cubic-bezier(.4,.0,.2,1); }
  .ring-label {
    font-family: var(--mono); font-size: 4px;
    fill: var(--ink-faint); text-anchor: middle;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .ring-value {
    font-family: var(--serif); font-size: 6px;
    fill: var(--ink); text-anchor: middle; font-weight: 600;
  }

  .hero-meta { flex: 1 1 300px; min-width: 240px; }

  .headline {
    font-family: var(--serif);
    font-size: clamp(17px, 2.1vw, 21px);
    line-height: 1.45;
    color: var(--ink);
    margin: 0 0 16px;
    border-left: 2px solid var(--teal);
    padding-left: 16px;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
    background: var(--surface); color: var(--ink-soft);
    border: 1px solid var(--rule);
  }
  .chip.ok    { color: var(--teal); border-color: rgba(94,184,157,.3); background: rgba(94,184,157,.08); }
  .chip.warn  { color: var(--amber); border-color: rgba(217,165,90,.3); background: rgba(217,165,90,.08); }
  .chip.bad   { color: var(--rose); border-color: rgba(232,120,120,.3); background: rgba(232,120,120,.08); }
  .chip.violet{ color: var(--violet); border-color: rgba(176,139,214,.3); background: rgba(176,139,214,.08); }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px 24px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
  }
  .meta-label {
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink-faint); margin-bottom: 4px;
  }
  .meta-value {
    color: var(--ink); font-family: var(--mono); font-size: 12px;
    word-break: break-all;
  }

  /* ===== Sections ===== */
  section[data-section] { margin-bottom: 56px; scroll-margin-top: 16px; }
  section h2 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    color: var(--ink);
  }
  section h3 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    margin: 24px 0 10px;
    font-weight: 500;
  }
  section p { color: var(--ink); margin: 0 0 12px; }

  /* ===== Synthesis lists ===== */
  .synth-list { list-style: none; padding: 0; margin: 0 0 12px; display: grid; gap: 6px; }
  .synth-list li {
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 4px;
    border-left: 2px solid var(--rule-strong);
    font-size: 14px; line-height: 1.55;
  }
  .synth-list.majority li  { border-left-color: var(--teal); }
  .synth-list.minority li  { border-left-color: var(--amber); }
  .synth-list.questions li { border-left-color: var(--blue); font-style: italic; color: var(--ink-soft); }
  .empty-note { color: var(--ink-faint); font-style: italic; font-size: 13px; margin: 0; }

  /* ===== Convergence trajectory ===== */
  .trajectory { display: grid; gap: 12px; }
  .trajectory-row {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 12px; align-items: center;
    font-size: 13px;
  }
  .trajectory-row .round-label { font-family: var(--mono); color: var(--ink-soft); font-size: 12px; }
  .trajectory-bar {
    position: relative; height: 8px;
    background: var(--surface); border-radius: 999px; overflow: hidden;
  }
  .trajectory-bar .fill {
    position: absolute; left: 0; top: 0; height: 100%;
    transition: width 600ms ease-out;
  }
  .trajectory-bar .threshold {
    position: absolute; left: 80%; top: -3px; bottom: -3px; width: 1px;
    background: var(--ink-faint); opacity: .55;
  }
  .trajectory-row .stat {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint); white-space: nowrap;
  }
  .trajectory-legend { margin-top: 12px; font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }

  /* ===== Round panels ===== */
  .round {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 6px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .round-header {
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; cursor: pointer; user-select: none;
    list-style: none;
  }
  .round-header::-webkit-details-marker { display: none; }
  .round-header:hover { background: var(--surface-2); }
  .round[open] .round-header { border-bottom: 1px solid var(--rule); }
  .round-title {
    font-family: var(--serif); font-size: 18px; font-weight: 500;
    color: var(--ink); display: flex; align-items: center; gap: 10px;
  }
  .round-toggle {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint); transition: transform 150ms; display: inline-block;
  }
  .round[open] .round-toggle { transform: rotate(90deg); }
  .round-stats { display: flex; gap: 6px; align-items: center; }
  .round-body { padding: 18px; }

  .peer-grid { display: grid; gap: 16px; }
  @media (min-width: 1024px) {
    .peer-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  }

  .peer-card { border-top: 2px solid var(--peer-color, var(--rule-strong)); padding: 12px 0 0; }
  .peer-name {
    font-family: var(--mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--peer-color, var(--ink-soft));
    font-weight: 600; margin-bottom: 8px;
  }
  .statement {
    font-size: 13.5px; line-height: 1.6;
    color: var(--ink); white-space: pre-wrap;
    margin: 0 0 8px;
  }
  .statement.clamped {
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    overflow: hidden;
    position: relative;
    padding-bottom: 12px;
    mask-image: linear-gradient(180deg, #000 70%, transparent);
    -webkit-mask-image: linear-gradient(180deg, #000 70%, transparent);
  }
  .statement-toggle {
    background: none; border: 1px solid var(--rule);
    color: var(--ink-soft); font-family: var(--mono); font-size: 11px;
    padding: 3px 10px; border-radius: 3px; cursor: pointer;
    margin-bottom: 12px;
  }
  .statement-toggle:hover { color: var(--ink); border-color: var(--rule-strong); }

  /* ===== Claims ===== */
  .claims { list-style: none; padding: 0; margin: 6px 0 0; display: grid; gap: 4px; }
  .claim {
    display: grid; grid-template-columns: 22px 1fr;
    gap: 10px; padding: 8px 10px;
    background: var(--bg-2); border-radius: 3px;
    font-size: 13px; line-height: 1.5;
    border-left: 2px solid var(--rule-strong);
  }
  .claim-glyph { font-family: var(--mono); font-weight: 700; text-align: center; line-height: 1.4; user-select: none; }
  .claim-text { color: var(--ink); }
  .claim-reason { display: block; margin-top: 4px; font-style: italic; color: var(--ink-soft); font-size: 12px; }
  .claim.assertion  { border-left-color: var(--teal); }
  .claim.assertion  .claim-glyph { color: var(--teal); }
  .claim.objection  { border-left-color: var(--rose); }
  .claim.objection  .claim-glyph { color: var(--rose); }
  .claim.concession { border-left-color: var(--amber); }
  .claim.concession .claim-glyph { color: var(--amber); }
  .claim.refinement { border-left-color: var(--violet); }
  .claim.refinement .claim-glyph { color: var(--violet); }

  .claim-tag {
    display: inline-block; font-family: var(--mono); font-size: 10px;
    color: var(--ink-faint); margin-right: 6px;
    background: var(--surface); padding: 1px 6px;
    border-radius: 999px; border: 1px solid var(--rule);
  }

  .convergence-note {
    margin-top: 16px; padding: 10px 14px; border-radius: 4px;
    background: var(--bg-2); border: 1px dashed var(--rule);
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.5;
    display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap;
  }

  /* ===== Catalog ===== */
  .filters {
    display: flex; flex-wrap: wrap; gap: 16px;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
    align-items: center;
  }
  .filter-group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .filter-label {
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--ink-faint); margin-right: 4px;
  }
  .filter-chip {
    background: var(--surface); border: 1px solid var(--rule);
    color: var(--ink-soft); font-family: var(--mono); font-size: 11px;
    padding: 3px 10px; border-radius: 999px; cursor: pointer;
    transition: background 120ms, color 120ms, border-color 120ms;
  }
  .filter-chip:hover { color: var(--ink); border-color: var(--rule-strong); }
  .filter-chip[aria-pressed="true"] {
    background: var(--surface-2); color: var(--ink); border-color: var(--ink-faint);
  }

  .catalog-list { display: grid; gap: 6px; list-style: none; padding: 0; margin: 0; }
  .catalog-list .claim { padding: 10px 12px; background: var(--surface); }
  .catalog-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); margin-bottom: 4px; }
  .catalog-meta .peer-tag { color: var(--peer-color, var(--ink-soft)); margin-right: 8px; font-weight: 600; }

  /* ===== Details footer ===== */
  details.details-block {
    background: var(--surface); border: 1px solid var(--rule);
    border-radius: 6px; padding: 14px 18px;
  }
  details.details-block summary {
    cursor: pointer; font-family: var(--mono); font-size: 12px;
    color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em;
    list-style: none; display: flex; align-items: center; gap: 8px;
  }
  details.details-block summary::-webkit-details-marker { display: none; }
  details.details-block summary::before {
    content: "▸"; color: var(--ink-faint); transition: transform 150ms;
  }
  details.details-block[open] summary::before { transform: rotate(90deg); }
  details.details-block table { border-collapse: collapse; margin-top: 12px; font-family: var(--mono); font-size: 12px; }
  details.details-block th { color: var(--ink-faint); text-align: left; font-weight: 500; padding: 4px 18px 4px 0; }
  details.details-block td { color: var(--ink); padding: 4px 18px 4px 0; }
  details.details-block ul { margin: 12px 0 0; padding-left: 18px; color: var(--ink-soft); }
  details.details-block li { margin-bottom: 4px; font-size: 12px; }

  footer {
    margin-top: 32px; text-align: center;
    color: var(--ink-faint); font-family: var(--mono); font-size: 11px;
  }

  /* Peer accent colors */
  .peer-1 { --peer-color: #d9a55a; }
  .peer-2 { --peer-color: #5eb89d; }
  .peer-3 { --peer-color: #b08bd6; }
  .peer-4 { --peer-color: #7aa6d6; }
  .peer-5 { --peer-color: #e87878; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="toc" id="toc" aria-label="Sections">
    <h4>Sections</h4>
    <nav id="toc-nav"></nav>
  </aside>
  <main id="main"></main>
</div>
<script type="application/json" id="data">__DATA_JSON__</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById("data").textContent);
  const main = document.getElementById("main");
  const tocNav = document.getElementById("toc-nav");

  const STANCE_GLYPH = {
    assertion: "▲",
    objection: "×",
    concession: "≈",
    refinement: "◆",
  };

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  })[c]);

  const stanceClass = (s) => {
    const k = (s || "assertion").toLowerCase();
    return STANCE_GLYPH[k] ? k : "assertion";
  };
  const stanceGlyph = (s) => STANCE_GLYPH[stanceClass(s)] || "·";

  // ===== Hero =====
  function renderHero() {
    const { meta, synthesis } = data;
    const conf = synthesis?.confidence || "n/a";
    const confPct = conf === "high" ? 1.0 : conf === "medium" ? 0.66 : conf === "low" ? 0.33 : 0;
    const confColor = conf === "high" ? "#5eb89d" : conf === "low" ? "#e87878" : "#d9a55a";

    const r = 15.9155;
    const circumference = 2 * Math.PI * r;
    const dashLen = circumference * confPct;

    const peerCount = Object.keys(meta.peers || {}).length;
    const lastRound = meta.lastCompletedRound || 0;
    const totalRounds = meta.rounds;

    const termChip = meta.terminationReason === "converged"
      ? '<span class="chip ok">converged</span>'
      : meta.terminationReason === "rounds-exhausted"
        ? '<span class="chip warn">rounds exhausted</span>'
        : '<span class="chip">' + esc(meta.terminationReason || "—") + '</span>';

    return `<section class="hero" id="overview" data-section>
  <p class="kicker">Multi-agent debate</p>
  <h1>${esc(meta.question)}</h1>
  <div class="hero-grid">
    <svg class="ring" viewBox="0 0 36 36" role="img" aria-label="Confidence ${esc(conf)}">
      <circle class="ring-bg" cx="18" cy="18" r="${r}" fill="none" stroke-width="2.5"/>
      <circle class="ring-fg" cx="18" cy="18" r="${r}" fill="none" stroke="${confColor}" stroke-width="2.5"
        stroke-dasharray="${dashLen.toFixed(2)} ${(circumference - dashLen).toFixed(2)}"
        stroke-dashoffset="${(circumference / 4).toFixed(2)}"
        stroke-linecap="round" transform="rotate(-90 18 18)"/>
      <text x="18" y="16.5" class="ring-label">conf.</text>
      <text x="18" y="22" class="ring-value">${esc(conf)}</text>
    </svg>
    <div class="hero-meta">
      <p class="headline">${esc(synthesis?.headline || "(synthesis missing)")}</p>
      <div class="chips">
        ${termChip}
        <span class="chip">${peerCount} peers</span>
        <span class="chip">${lastRound}/${esc(totalRounds)} rounds</span>
      </div>
    </div>
  </div>
  <div class="meta-grid">
    <div>
      <div class="meta-label">Synthesis agent</div>
      <div class="meta-value">${esc(meta.synthesisAgent || "—")}</div>
    </div>
    <div>
      <div class="meta-label">Run started</div>
      <div class="meta-value">${esc(meta.createdAt || "—")}</div>
    </div>
    <div>
      <div class="meta-label">Run dir</div>
      <div class="meta-value">${esc(meta.runDir || "—")}</div>
    </div>
  </div>
</section>`;
  }

  // ===== Synthesis =====
  function renderSynthesis() {
    const s = data.synthesis;
    if (!s) {
      return '<section data-section id="synthesis"><h2>Synthesis</h2><p class="empty-note">synthesis.json missing.</p></section>';
    }
    const list = (xs, cls) => xs && xs.length
      ? `<ul class="synth-list ${cls}">${xs.map((x) => `<li>${esc(x)}</li>`).join("")}</ul>`
      : '<p class="empty-note">(none)</p>';
    return `<section data-section id="synthesis">
  <h2>Synthesis</h2>
  <h3>Rationale</h3>
  <p>${esc(s.rationale)}</p>
  <h3>Majority claims · ${(s.majorityClaims || []).length}</h3>
  ${list(s.majorityClaims, "majority")}
  <h3>Minority claims · ${(s.minorityClaims || []).length}</h3>
  ${list(s.minorityClaims, "minority")}
  <h3>Open questions · ${(s.openQuestions || []).length}</h3>
  ${list(s.openQuestions, "questions")}
</section>`;
  }

  // ===== Convergence trajectory =====
  function renderConvergence() {
    const rows = data.rounds.map((round) => {
      if (round.round === 1) {
        const claimCount = round.peers.reduce((sum, p) => sum + (p.claims?.length || 0), 0);
        return `<div class="trajectory-row">
  <div class="round-label">Round 1</div>
  <div class="trajectory-bar"></div>
  <div class="stat">${claimCount} claims · opening</div>
</div>`;
      }
      const cv = round.convergence;
      if (!cv) {
        return `<div class="trajectory-row">
  <div class="round-label">Round ${round.round}</div>
  <div class="trajectory-bar"></div>
  <div class="stat">no convergence check</div>
</div>`;
      }
      const restated = cv.totalClaimCount ? (cv.totalClaimCount - cv.novelClaimCount) / cv.totalClaimCount : 0;
      const pct = (restated * 100).toFixed(0);
      const color = cv.converged ? "#5eb89d" : "#d9a55a";
      return `<div class="trajectory-row">
  <div class="round-label">Round ${round.round}</div>
  <div class="trajectory-bar">
    <div class="fill" style="width:${pct}%;background:${color}"></div>
    <div class="threshold" title="80% convergence threshold"></div>
  </div>
  <div class="stat">${pct}% restated · ${cv.novelClaimCount}/${cv.totalClaimCount} novel</div>
</div>`;
    }).join("");

    return `<section data-section id="convergence">
  <h2>Convergence trajectory</h2>
  <div class="trajectory">${rows}</div>
  <div class="trajectory-legend">filled bar = portion of restated claims · vertical mark at 80% = convergence threshold</div>
</section>`;
  }

  // ===== Rounds =====
  function renderRound(round) {
    const peerCards = round.peers
      .filter((p) => p.statement || p.claims?.length)
      .map((p) => {
        const claims = (p.claims || []).map((c) => {
          const cls = stanceClass(c.stance);
          const reason = c.supportingReason ? `<span class="claim-reason">— ${esc(c.supportingReason)}</span>` : "";
          return `<li class="claim ${cls}"><span class="claim-glyph" aria-label="${cls}">${stanceGlyph(c.stance)}</span><span class="claim-text">${esc(c.text)}${reason}</span></li>`;
        }).join("");

        const stmt = p.statement?.trim() || "";
        const long = stmt.length > 320 || stmt.split("\n").length > 6;
        const stmtCls = long ? "statement clamped" : "statement";
        const toggle = long ? '<button class="statement-toggle" data-toggle-statement aria-expanded="false">Show full statement</button>' : "";

        return `<div class="peer-card ${esc(p.peer)}">
  <div class="peer-name">${esc(p.peer)} · ${(p.claims || []).length} claims</div>
  ${stmt ? `<p class="${stmtCls}">${esc(stmt)}</p>` : '<p class="statement empty-note">(no statement)</p>'}
  ${toggle}
  ${claims ? `<ul class="claims">${claims}</ul>` : ""}
</div>`;
      }).join("");

    let convNote = "";
    if (round.convergence) {
      const cv = round.convergence;
      const verdict = cv.converged ? '<span class="chip ok">converged</span>' : '<span class="chip warn">moving</span>';
      convNote = `<div class="convergence-note">${verdict}<span>${esc(cv.rationale || "")}</span></div>`;
    }

    const peerCount = round.peers.filter((p) => p.statement).length;
    const claimCount = round.peers.reduce((s, p) => s + (p.claims?.length || 0), 0);
    const open = round.round === data.rounds.length ? " open" : "";
    const verdictChip = round.convergence
      ? (round.convergence.converged ? '<span class="chip ok">converged</span>' : '<span class="chip warn">moving</span>')
      : "";

    return `<details class="round" id="round-${round.round}"${open}>
  <summary class="round-header">
    <div class="round-title"><span class="round-toggle">▸</span>Round ${round.round}</div>
    <div class="round-stats">
      <span class="chip">${peerCount} peers</span>
      <span class="chip">${claimCount} claims</span>
      ${verdictChip}
    </div>
  </summary>
  <div class="round-body">
    <div class="peer-grid">${peerCards}</div>
    ${convNote}
  </div>
</details>`;
  }

  function renderRounds() {
    if (!data.rounds.length) return "";
    return `<section data-section id="rounds">
  <h2>Rounds</h2>
  ${data.rounds.map(renderRound).join("")}
</section>`;
  }

  // ===== Catalog =====
  function renderCatalog() {
    const catalog = data.catalog;
    if (!catalog || !Object.keys(catalog).length) return "";

    const peers = Object.keys(catalog).sort();
    const stances = ["assertion", "objection", "concession", "refinement"];
    const all = [];
    for (const peer of peers) {
      for (const c of catalog[peer]) all.push({ ...c, peer });
    }

    const peerFilters = peers.map((p) =>
      `<button class="filter-chip" data-filter="peer" data-value="${esc(p)}" aria-pressed="false">${esc(p)}</button>`
    ).join("");

    const stanceFilters = stances.map((s) =>
      `<button class="filter-chip" data-filter="stance" data-value="${s}" aria-pressed="false">${STANCE_GLYPH[s]} ${s}</button>`
    ).join("");

    const items = all.map((c) => {
      const cls = stanceClass(c.stance);
      const reason = c.supportingReason ? `<span class="claim-reason">— ${esc(c.supportingReason)}</span>` : "";
      return `<li class="claim ${cls} ${esc(c.peer)}" data-peer="${esc(c.peer)}" data-stance="${cls}">
  <span class="claim-glyph" aria-label="${cls}">${stanceGlyph(c.stance)}</span>
  <div>
    <div class="catalog-meta"><span class="peer-tag">${esc(c.peer)}</span><span class="claim-tag">R${esc(c.round)}</span></div>
    <span class="claim-text">${esc(c.text)}${reason}</span>
  </div>
</li>`;
    }).join("");

    return `<section data-section id="catalog">
  <h2 id="catalog-heading">Claim catalog · ${all.length}</h2>
  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">Peer</span>${peerFilters}
    </div>
    <div class="filter-group">
      <span class="filter-label">Stance</span>${stanceFilters}
    </div>
  </div>
  <ul class="catalog-list" id="catalog-list">${items}</ul>
</section>`;
  }

  // ===== Details footer =====
  function renderDetails() {
    const meta = data.meta;
    const peerRows = Object.entries(meta.peers || {})
      .map(([peer, agent]) => `<tr><td>${esc(peer)}</td><td>${esc(agent)}</td></tr>`)
      .join("");
    const notes = meta.notes
      ? Object.entries(meta.notes).map(([k, v]) => `<li><strong style="color:var(--ink)">${esc(k)}</strong>: ${esc(v)}</li>`).join("")
      : "";
    return `<section data-section id="details">
  <details class="details-block">
    <summary>Run details · participant mapping &amp; notes</summary>
    <h3 style="margin-top:12px">Peer → agent</h3>
    <table>
      <thead><tr><th>peer</th><th>agent</th></tr></thead>
      <tbody>${peerRows}</tbody>
    </table>
    ${notes ? `<h3 style="margin-top:14px">Notes</h3><ul>${notes}</ul>` : ""}
    <h3 style="margin-top:14px">Config</h3>
    <p style="font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin:0">${esc(meta.config || "")}</p>
  </details>
  <footer>Generated from <code>${esc(meta.runDir)}</code></footer>
</section>`;
  }

  // ===== TOC =====
  function renderTOC() {
    const links = [];
    links.push(`<a href="#overview">Overview</a>`);
    if (data.synthesis) links.push(`<a href="#synthesis">Synthesis</a>`);
    if (data.rounds.length > 1) links.push(`<a href="#convergence">Convergence</a>`);
    if (data.rounds.length) {
      links.push(`<a href="#rounds">Rounds</a>`);
      for (const r of data.rounds) {
        links.push(`<a href="#round-${r.round}" class="indent">↳ Round ${r.round}</a>`);
      }
    }
    if (data.catalog && Object.keys(data.catalog).length) {
      links.push(`<a href="#catalog">Catalog</a>`);
    }
    links.push(`<a href="#details">Run details</a>`);
    return links.join("");
  }

  main.innerHTML = [
    renderHero(),
    renderSynthesis(),
    data.rounds.length > 1 ? renderConvergence() : "",
    renderRounds(),
    renderCatalog(),
    renderDetails(),
  ].join("");

  tocNav.innerHTML = renderTOC();

  // statement expand/collapse
  main.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-toggle-statement]");
    if (!btn) return;
    const stmt = btn.previousElementSibling;
    if (stmt && stmt.classList.contains("statement")) {
      const wasClamped = stmt.classList.contains("clamped");
      stmt.classList.toggle("clamped");
      btn.textContent = wasClamped ? "Collapse" : "Show full statement";
      btn.setAttribute("aria-expanded", wasClamped ? "true" : "false");
    }
  });

  // catalog filtering
  const catalogFilters = { peer: new Set(), stance: new Set() };
  main.addEventListener("click", (e) => {
    const chip = e.target.closest(".filter-chip");
    if (!chip) return;
    const set = catalogFilters[chip.dataset.filter];
    const value = chip.dataset.value;
    if (set.has(value)) {
      set.delete(value);
      chip.setAttribute("aria-pressed", "false");
    } else {
      set.add(value);
      chip.setAttribute("aria-pressed", "true");
    }
    applyCatalogFilters();
  });

  function applyCatalogFilters() {
    const list = document.getElementById("catalog-list");
    if (!list) return;
    const peerActive = catalogFilters.peer.size > 0;
    const stanceActive = catalogFilters.stance.size > 0;
    let visible = 0;
    const items = list.querySelectorAll(".claim");
    for (const li of items) {
      const peerOk = !peerActive || catalogFilters.peer.has(li.dataset.peer);
      const stanceOk = !stanceActive || catalogFilters.stance.has(li.dataset.stance);
      const show = peerOk && stanceOk;
      li.style.display = show ? "" : "none";
      if (show) visible++;
    }
    const heading = document.getElementById("catalog-heading");
    if (heading) {
      heading.textContent = (peerActive || stanceActive)
        ? `Claim catalog · ${visible} of ${items.length}`
        : `Claim catalog · ${items.length}`;
    }
  }

  // TOC active section tracking
  if ("IntersectionObserver" in window) {
    const sections = document.querySelectorAll("[data-section], details.round");
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((en) => {
        if (en.isIntersecting) {
          const id = en.target.id;
          tocNav.querySelectorAll("a").forEach((a) => {
            a.classList.toggle("active", a.getAttribute("href") === "#" + id);
          });
        }
      });
    }, { rootMargin: "-30% 0px -60% 0px", threshold: 0 });
    sections.forEach((s) => obs.observe(s));
  }
})();
</script>
</body>
</html>
