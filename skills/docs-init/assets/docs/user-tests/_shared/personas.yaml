# Personas registry — shared across all plans (durable Library).
#
# Every assertion in a validation contract names a persona by id. The persona supplies
# the concrete credentials, permissions, and fixtures a probe needs, so "a user" never
# drifts into ten different definitions. Add a persona here when a contract needs one;
# owner skill is harness-stack:test-spec.
#
# Schema per entry:
#   <id>:
#     description: <one line — who this persona is>
#     auth: <none | session | api-key | role:...>   # how the persona authenticates
#     fixtures: [<paths under _shared/fixtures/ this persona depends on>]

personas:
  anonymous_visitor:
    description: A logged-out visitor exercising the public, unauthenticated surface.
    auth: none
    fixtures: []
